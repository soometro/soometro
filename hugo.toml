# 1. 사이트 기본 정보 설정
baseURL = "https://soometro.kr/" 
defaultContentLanguage = "ko"
locale = "ko-KR"                # languageCode 대신 locale 사용 (최신 규격)
title = "soometro"
theme = "hugo-book"

# 2. 고유 주소(Permalinks) 깔끔하게 정리.
[permalinks]
  posts = "/:section/:title/"
  page = "/:section/:title/"

# 3. 마크다운 렌더러 설정 (HTML 및 div 태그 허용)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true 


# 4. hugo-book 테마 전용 매개변수 설정
[params]
  # BookTitle = "soometro"
  BookLogo = "logo.webp"
  BookSearch = true           # 로컬 검색창 활성화
  
  # 메뉴 접기/펼치기 기능 활성화
  BookMenuBundle = true
  
  # 다크모드 설정: "auto"로 설정하면 테마가 자동으로 다크모드 지원
  BookTheme = "auto"

  # 다크모드 수동 전환 제어 모듈 활성화 (★이 줄이 추가되었습니다)
  BookDarkMode = true
  
  # 다크모드 전환 버튼 활성화
  BookPortableLinks = true

  # 대표이미지
  images = ["/images/og-default.png"]
  BookDisableGoogleFonts = true


# 5. 다국어 및 한국어 기본 설정
[languages]
  [languages.ko]
    label = "Korean"          # languageName 대신 label 사용 (최신 규격)
    weight = 1

enableRobotsTXT = false

# 6. 고유 주소(URL) 자동 영자 변환 설정
removePathAccents = true
 

# 7. 수정일(Lastmod) 자동 감지 설정 (실제 파일 저장 시간 기준)
[frontmatter]
  lastmod = ["lastmod", ":fileModTime", "date", "publishDate"]

