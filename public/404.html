<script>
    document.addEventListener("DOMContentLoaded", function () {
        
        const userAgent = navigator.userAgent.toLowerCase();
        const botKeywords = [
            'bot', 'spider', 'crawler', 'crawl', 'slurp', 'yeti', 'daumoa', 
            'naver', 'google', 'bing', 'yahoo', 'duckduckgo', 'baidu',
            'mediapartners', 'adsbot', 'facebookexternalhit', 'ia_archiver',
            'chatgpt', 'openai', 'anthropic', 'gemini', 'perplexity'
        ];
        
        const isBot = botKeywords.some(keyword => userAgent.includes(keyword));
        if (isBot) {
            console.log("[Counter] Bot traffic ignored.");
            return;
        }

        
        if (localStorage.getItem('my_admin') === 'true') {
            console.log("[Counter] Admin access detected. Counting skipped.");
            return;
        }

        
        const supabaseUrl = "https://jmosoaoxjuudcffbeoxi.supabase.co";
        const supabaseKey = "sb_publishable_JDKL8SsX9JJX-gnHViqLOw_LBGxlKte";
        
        
        const pageUrl = window.location.pathname;
        const rawIp = Math.random().toString(36).substring(2); 
        const ipHash = localStorage.getItem('user_hash') || rawIp;
        if (!localStorage.getItem('user_hash')) {
            localStorage.setItem('user_hash', ipHash);
        }

        
        fetch(`${supabaseUrl}/rest/v1/rpc/increment_and_get_stats`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": supabaseKey,
                "Authorization": `Bearer ${supabaseKey}`
            },
            body: JSON.stringify({
                page_url: pageUrl,
                user_ip_hash: ipHash
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data && data.length > 0) {
                const stats = data[0];
                const todayEl = document.getElementById("counter-today");
                const monthlyEl = document.getElementById("counter-monthly");
                const totalEl = document.getElementById("counter-total");
                
                if (todayEl) todayEl.innerText = stats.today_count.toLocaleString();
                if (monthlyEl) monthlyEl.innerText = stats.monthly_count.toLocaleString();
                if (totalEl) totalEl.innerText = stats.total_count.toLocaleString();

                window.currentPageHit = stats.page_hit;
            } else if (data && !Array.isArray(data)) {
                const todayEl = document.getElementById("counter-today");
                const monthlyEl = document.getElementById("counter-monthly");
                const totalEl = document.getElementById("counter-total");
                
                if (todayEl) todayEl.innerText = data.today_count.toLocaleString();
                if (monthlyEl) monthlyEl.innerText = data.monthly_count.toLocaleString();
                if (totalEl) totalEl.innerText = data.total_count.toLocaleString();

                window.currentPageHit = data.page_hit;
            }
        })
        .catch(err => console.error("Counter Error:", err));
    });
</script>
