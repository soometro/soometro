<script>
    document.addEventListener("DOMContentLoaded", function () {
        const userAgent = navigator.userAgent.toLowerCase();
        const botKeywords = ['bot', 'spider', 'crawler', 'crawl', 'slurp', 'yeti', 'daumoa', 'naver', 'google', 'bing', 'yahoo', 'duckduckgo', 'baidu', 'mediapartners', 'adsbot', 'facebookexternalhit', 'ia_archiver', 'chatgpt', 'openai', 'anthropic', 'gemini', 'perplexity'];
        
        const isBot = botKeywords.some(keyword => userAgent.includes(keyword));
        if (isBot) return;

        
        const isAdmin = localStorage.getItem('my_admin') === 'true';

        const supabaseUrl = "https://jmosoaoxjuudcffbeoxi.supabase.co";
        const supabaseKey = "sb_publishable_JDKL8SsX9JJX-gnHViqLOw_LBGxlKte";
        
        const pageUrl = window.location.pathname;
        const rawIp = Math.random().toString(36).substring(2); 
        const ipHash = localStorage.getItem('user_hash') || rawIp;
        if (!localStorage.getItem('user_hash')) {
            localStorage.setItem('user_hash', ipHash);
        }

        
        fetch(`${supabaseUrl}/rest/v1/rpc/increment_and_get_stats`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": supabaseKey,
                "Authorization": `Bearer ${supabaseKey}`
            },
            body: JSON.stringify({
                page_url: pageUrl,
                user_ip_hash: isAdmin ? "ADMIN_SKIP" : ipHash 
            })
        })
        .then(res => res.json())
        .then(data => {
            const result = Array.isArray(data) ? data[0] : data;
            if (result) {
                const todayEl = document.getElementById("counter-today");
                const monthlyEl = document.getElementById("counter-monthly");
                const totalEl = document.getElementById("counter-total");
                
                if (todayEl) todayEl.innerText = (result.today_count || 0).toLocaleString();
                if (monthlyEl) monthlyEl.innerText = (result.monthly_count || 0).toLocaleString();
                if (totalEl) totalEl.innerText = (result.total_count || 0).toLocaleString();

                window.currentPageHit = result.page_hit || 0;
            }
        })
        .catch(err => console.error("Counter Error:", err));
    });
</script>
