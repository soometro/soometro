<div class="book-menu-widgets" style="margin-top: 2rem; padding: 0.5rem 0.5rem 0.5rem 0; border-top: 1px dashed #ccc; font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, BlinkMacSystemFont, Dotum, 돋움, sans-serif; font-size: 0.85rem; color: #666; font-weight: bold;">
    
    <div class="theme-toggle-container" style="margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.4rem;">
        <span style="font-size: 0.75rem; color: #888; font-weight: 600; letter-spacing: -0.02rem;">SITE THEME</span>
        <div>
            <button id="theme-toggle-btn" style="background: none; border: none; cursor: pointer; font-family: inherit; font-size: 0.85rem; color: var(--color-link) !important; font-weight: bold; padding: 0; text-decoration: none;">
                🌓 모드 전환하기
            </button>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; margin-bottom: 0.2rem;">
        <span>TODAY:</span>
        <span id="counter-today" style="color: var(--color-text);">0</span>
    </div>
    <div style="display: flex; justify-content: space-between; margin-bottom: 0.2rem;">
        <span>MONTHLY:</span>
        <span id="counter-monthly" style="color: var(--color-text);">0</span>
    </div>
    <div style="display: flex; justify-content: space-between;">
        <span>TOTAL:</span>
        <span id="counter-total" style="color: var(--color-text);">0</span>
    </div>
</div>

<style>
    html.forced-dark {
        --color-diagram-bg: #fff;
        --gray-100: #1e1e1e;
        --gray-200: #2d2d2d;
        --gray-500: #aaa;
        --body-background: #111111 !important;
        --color-text: #e0e0e0 !important;
        --color-link: #8ab4f8 !important;
        background-color: #111111 !important;
        color: #e0e0e0 !important;
    }
    html.forced-dark .book-menu, 
    html.forced-dark .book-page,
    html.forced-dark aside {
        background-color: #111111 !important;
        color: #e0e0e0 !important;
    }
</style>

<script>
    (function() {
        // --- [A] 테마 제어 로직 (정밀 보정 버전) ---
        const htmlEl = document.documentElement;
        const toggleBtn = document.getElementById('theme-toggle-btn');
        
        if (toggleBtn) {
            // 사용자의 기존 변경 기록이 있는지 확인
            const hasSaved = localStorage.getItem('forced_theme');
            // 기록이 없다면 현재 컴퓨터/스마트폰 자체의 다크모드 설정 상태를 감지
            const isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            // 저장된 기록이 있으면 그것을 쓰고, 없다면 시스템 설정을 초기 테마로 결정
            const initialTheme = hasSaved ? hasSaved : (isSystemDark ? 'dark' : 'light');
            
            // 결정된 초기 테마를 사이트에 적용
            applyTheme(initialTheme);

            toggleBtn.addEventListener('click', function() {
                const isDark = htmlEl.classList.contains('forced-dark');
                applyTheme(isDark ? 'light' : 'dark');
            });
        }

        function applyTheme(theme) {
            if (!toggleBtn) return;
            if (theme === 'dark') {
                htmlEl.classList.add('forced-dark');
                htmlEl.setAttribute('data-theme', 'dark');
                localStorage.setItem('forced_theme', 'dark');
                toggleBtn.innerText = "☀️ 라이트 모드로 보기";
            } else {
                htmlEl.classList.remove('forced-dark');
                htmlEl.setAttribute('data-theme', 'light');
                localStorage.setItem('forced_theme', 'light');
                toggleBtn.innerText = "🌙 다크 모드로 보기";
            }
        }

        // --- [B] 복원된 조회수 통신 로직 ---
        const currentPath = window.location.pathname;
        
        fetch('https://wggvjymwocgbtasclwre.supabase.co/functions/v1/page-vibe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: currentPath })
        })
        .then(res => res.json())
        .then(data => {
            if (data) {
                document.getElementById('counter-today').innerText = (data.today || 0).toLocaleString();
                document.getElementById('counter-monthly').innerText = (data.monthly || 0).toLocaleString();
                document.getElementById('counter-total').innerText = (data.total || 0).toLocaleString();
            }
        })
        .catch(err => console.error('Counter sync error:', err));
    })();
</script>
