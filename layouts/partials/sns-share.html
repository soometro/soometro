<div class="sns-share-container">
  <h4>이 문서 공유하기</h4>
  <div class="sns-share-buttons">
    
    <!-- 1. URL 주소 복사 (브라우저 표준 클립보드 기능 직통 호출) -->
    <a class="share-btn copy-link" href="#" onclick="navigator.clipboard.writeText(window.location.href); alert('주소가 클립보드에 복사되었습니다!'); return false;" title="URL 복사">
      <span class="icon-text">LN</span>
      <span class="label">URL 복사</span>
    </a>

    <!-- 2. 카카오톡 공유 -->
    <a class="share-btn kakaotalk" href="https://kakao.com{{ .Permalink | urlquery }}" target="_blank" rel="noopener noreferrer" title="카카오톡 공유">
      <span class="icon-text">KT</span>
      <span class="label">카카오톡</span>
    </a>

    <!-- 3. 네이버 블로그 공유 -->
    <a class="share-btn naver-blog" href="https://naver.com{{ .Permalink | urlquery }}&title={{ .Title | urlquery }}" target="_blank" rel="noopener noreferrer" title="네이버 블로그 공유">
      <span class="icon-text">NB</span>
      <span class="label">블로그</span>
    </a>

    <!-- 4. 네이버 Keep 저장 -->
    <a class="share-btn naver-keep" href="https://naver.com{{ .Permalink | urlquery }}&title={{ .Title | urlquery }}" target="_blank" rel="noopener noreferrer" title="네이버 Keep 저장">
      <span class="icon-text">NK</span>
      <span class="label">Keep</span>
    </a>

    <!-- 5. 엑스 (구 트위터) 공유 -->
    <a class="share-btn x-twitter" href="https://x.com{{ .Permalink | urlquery }}&text={{ .Title | urlquery }}" target="_blank" rel="noopener noreferrer" title="X 공유">
      <span class="icon-text">𝕏</span>
      <span class="label">엑스</span>
    </a>

    <!-- 6. 쓰레드 (Threads) 공유 -->
    <a class="share-btn threads" href="https://threads.net{{ .Title | urlquery }}%20{{ .Permalink | urlquery }}" target="_blank" rel="noopener noreferrer" title="쓰레드 공유">
      <span class="icon-text">🧵</span>
      <span class="label">쓰레드</span>
    </a>

  </div>
</div>
